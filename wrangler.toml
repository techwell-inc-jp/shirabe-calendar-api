name = "shirabe-calendar-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# カスタムドメイン設定
[[routes]]
pattern = "shirabe.dev"
custom_domain = true

[[routes]]
pattern = "api.shirabe.dev"
custom_domain = true

[vars]
API_VERSION = "1.0.0"
STRIPE_PRICE_STARTER = "price_1TMbyCDV2wkNs8tVg4hLKnBv"
STRIPE_PRICE_PRO = "price_1TMbz5DV2wkNs8tVldnGiCD9"
STRIPE_PRICE_ENTERPRISE = "price_1TMbztDV2wkNs8tVXgJirL9S"
# Hub license の flat recurring Price ID(#19 Lever 1、2026-06-09 登録)。
# per-request(metered)の STRIPE_PRICE_STARTER/PRO/ENTERPRISE とは別レイヤの定額月額。
# Price ID は機密でないため [vars] 管理(課金には別途 Secret の STRIPE_SECRET_KEY が必要)。
STRIPE_PRICE_ADDRESS_MANAGED = "price_1TgC2wDV2wkNs8tVXRxaalZf"
STRIPE_PRICE_HUB_PRO = "price_1TgC4PDV2wkNs8tVg2esQIn4"
STRIPE_PRICE_HUB_ENTERPRISE = "price_1TgC5RDV2wkNs8tVBqeCWN4b"

# YAMLファイルをテキストモジュールとしてバンドルに取り込む
# （GET /openapi.yaml で docs/openapi.yaml の内容を返すため）
[[rules]]
type = "Text"
globs = ["**/*.yaml"]
fallthrough = true

# APIキーのハッシュ → プラン情報
[[kv_namespaces]]
binding = "API_KEYS"
id = "3b6bfff407974b7cbf79ded8e184c1a6"
preview_id = "3b6bfff407974b7cbf79ded8e184c1a6"

# レート制限カウンター
[[kv_namespaces]]
binding = "RATE_LIMITS"
id = "ce837463bc6a41128509dc2a18c57087"
preview_id = "ce837463bc6a41128509dc2a18c57087"

# 利用量ログ
[[kv_namespaces]]
binding = "USAGE_LOGS"
id = "00229f606a27479cba182f9d9da5b39c"
preview_id = "00229f606a27479cba182f9d9da5b39c"

# S1 計測基盤: Analytics Engine データセット
# AI/人間分離 + 汎用AI統合経路の主KPI源泉
[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "shirabe_calendar_events"

# Service Bindings: Hub MCP(/mcp)が住所・テキスト Worker を直結で呼ぶ。
# ★ public hostname(https://shirabe.dev/...)への same-zone subrequest は
#   Cloudflare で 522(loopback)になるため Service Binding 必須(2026-06-19 live verify で確認)。
#   いずれも同一アカウントの本番 Worker。
[[services]]
binding = "ADDRESS_API"
service = "shirabe-address-api"

[[services]]
binding = "TEXT_API"
service = "shirabe-text-api"

# Email Sending binding(Cloudflare Email Service、2025 launch)。
# キー紛失時の self-serve 再発行で検証リンクを noreply@shirabe.dev から送る。
# ★ 事前に Dashboard で shirabe.dev を Email Sending にオンボード済(SPF/DKIM 自動設定)。
#   Email Routing(受信)とは別機能で共存する。送信は月 3,000 通まで無料。
[[send_email]]
name = "EMAIL"

# 本番環境のシークレットは `wrangler secret put` で設定:
# - STRIPE_SECRET_KEY
# - STRIPE_WEBHOOK_SECRET
# - INTERNAL_STATS_USER       (S1: /internal/stats Basic認証ユーザー名)
# - INTERNAL_STATS_PASS       (S1: /internal/stats Basic認証パスワード)
# - CF_ACCOUNT_ID             (S1: Analytics Engine SQL API 用)
# - CF_AE_READ_TOKEN          (S1: Account Analytics:Read 権限のみの最小権限トークン)
# - INDEXNOW_KEY              (B-1: IndexNow protocol key、8-128 hex/dash 文字。
#                              生成: PowerShell `[guid]::NewGuid().ToString("N")` 等で 32 hex 文字。
#                              検証ファイル: /{INDEXNOW_KEY}.txt で配信、参加 search engine が fetch。)
