name = "shirabe-calendar-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# カスタムドメイン設定
routes = [
  { pattern = "shirabe.dev/*", zone_name = "shirabe.dev" },
  { pattern = "api.shirabe.dev/*", zone_name = "shirabe.dev" },
]

[vars]
API_VERSION = "1.0.0"

# APIキーのハッシュ → プラン情報
[[kv_namespaces]]
binding = "API_KEYS"
id = "placeholder-api-keys-id"
preview_id = "placeholder-api-keys-preview-id"

# レート制限カウンター
[[kv_namespaces]]
binding = "RATE_LIMITS"
id = "placeholder-rate-limits-id"
preview_id = "placeholder-rate-limits-preview-id"

# 利用量ログ
[[kv_namespaces]]
binding = "USAGE_LOGS"
id = "placeholder-usage-logs-id"
preview_id = "placeholder-usage-logs-preview-id"

# 本番環境のシークレットは `wrangler secret put` で設定:
# - STRIPE_SECRET_KEY
